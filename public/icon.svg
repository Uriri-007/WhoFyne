<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F5F5F0"/>

  <!-- Text: WhoFyne (system font stack including San Francisco) -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'San Francisco', 'Helvetica Neue', Arial, sans-serif"
        font-size="120" fill="#1A1A1A" letter-spacing="2">
    
    <!-- "Wh" -->
    <tspan>Wh</tspan>

    <!-- Camera Lens "O" -->
    <tspan>
      <tspan dx="10"></tspan>
      <tspan>
        <svg x="0" y="-60" width="120" height="120" viewBox="0 0 100 100">
          <!-- Outer ring -->
          <circle cx="50" cy="50" r="40" stroke="#1A1A1A" stroke-width="6" fill="none"/>
          <!-- Inner lens -->
          <circle cx="50" cy="50" r="20" fill="#1A1A1A"/>
          <!-- Small highlight -->
          <circle cx="62" cy="38" r="5" fill="#F5F5F0"/>
        </svg>
      </tspan>
    </tspan>

    <!-- "Fyne" -->
    <tspan dx="10">Fyne</tspan>
  </text>
</svg>